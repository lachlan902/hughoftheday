<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugh Archive</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
    }

    img {
        margin-top: 20px;
        width: 400px;
        max-width: 90%;
        border-radius: 10px;
    }

    .controls {
        margin-top: 20px;
    }
</style>
</head>

<body>

<h1>Hugh Archive</h1>

<div class="controls">
    <button onclick="prevDay()">⬅</button>
    <button onclick="nextDay()">➡</button><br>
    <input type="date" id="datePicker" onchange="jumpToDate()">
</div>

<h2 id="dateTitle"></h2>

<!-- ✅ FIX: IMAGE -->
<img id="hughImage" src="">

<!-- ✅ FIX: LINK -->
<a href="index.html">Back to Today</a>

<script>
function formatDate(date) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function checkImage(src) {
    return new Promise(resolve => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
    });
}

async function findAllImages() {
    const images = [];
    const start = new Date(2026, 4, 24);
    const today = new Date();

    const formats = [".jpg", ".png"];

    for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const base = 
            `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;

        for (let ext of formats) {
            const file = base + ext;
            if (await checkImage(file)) {
                images.push(file);
                break;
            }
        }
    }

    return images;
}

let archive = {};
let dates = [];
let currentIndex = 0;

function displayDate(index) {
    const date = dates[index];
    document.getElementById("dateTitle").innerText = date;
    document.getElementById("hughImage").src = archive[date];
    document.getElementById("datePicker").value = date;
}

function prevDay() {
    if (currentIndex > 0) displayDate(--currentIndex);
}

function nextDay() {
    if (currentIndex < dates.length - 1) displayDate(++currentIndex);
}

function jumpToDate() {
    const val = document.getElementById("datePicker").value;
    const i = dates.indexOf(val);
    if (i !== -1) {
        currentIndex = i;
        displayDate(i);
    }
}

async function init() {
    const files = await findAllImages();

    files.forEach(f => {
        const d = f.split('.')[0];
        const formatted =
          `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
        archive[formatted] = f;
    });

    dates = Object.keys(archive).sort();
    currentIndex = dates.length - 1;
    displayDate(currentIndex);
}

init();
</script>

</body>
</html>
