<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugh of the Day</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5em;
    }

img {
    margin-top: 20px;
    width: 400px;       /* fixed medium width */
    max-width: 90%;     /* still responsive on small screens */
    height: auto;       /* keep correct proportions */
    border-radius: 10px;
}

    button {
        margin-top: 20px;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
    }

    a {
        display: block;
        margin-top: 20px;
        font-size: 18px;
        text-decoration: none;
        color: blue;
    }

.content {
    display: flex;
    flex-direction: column;
    align-items: center; /* centers image + button together */
}    
</style>
</head>

<body>

<h1>Hugh of the Day</h1>


<div class="content">
    <img id="hughImage" src="" alt="Loading Hugh...">
    <button onclick="loadRandomHugh()">🎲 Random Hugh</button>
</div>


<p id="progress"></p>
<p id="message" style="font-weight: bold;"></p>

<a href="archive.html">View Archive</a>

<script>
    const hughFiles = [
        "20260524.png",
        "20260525.png",
        "20260526.jpg"
    ];

    let shuffled = [];
    let currentIndex = 0;

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function resetShuffle() {
        shuffled = shuffle(hughFiles);
        currentIndex = 0;
        updateProgress();
    }

    function updateProgress() {
        document.getElementById("progress").innerText =
            `Seen ${currentIndex} / ${shuffled.length} Hughs`;
    }

    function loadRandomHugh() {
        if (currentIndex >= shuffled.length) {
            document.getElementById("message").innerText =
                "✅ You've seen all Hughs! Reshuffling...";
            resetShuffle();
        } else {
            document.getElementById("message").innerText = "";
        }

        document.getElementById("hughImage").src = shuffled[currentIndex];
        currentIndex++;

        updateProgress();
    }

    function getTodayFilename() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        return `${yyyy}${mm}${dd}`;
    }

    function loadTodayImage() {
        const baseName = getTodayFilename();
        const formats = [".jpg", ".png", ".jpeg"];
        let found = false;

        formats.forEach(ext => {
            if (found) return;

            const img = new Image();
            img.src = baseName + ext;

            img.onload = () => {
                document.getElementById("hughImage").src = img.src;
                found = true;
            };
        });

        setTimeout(() => {
            if (!found) {
                document.getElementById("hughImage").alt =
                    "No Hugh for today yet!";
            }
        }, 500);
    }

    resetShuffle();
    loadTodayImage();
</script>

</body>
</html>
