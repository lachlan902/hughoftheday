<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugh of the Day</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5em;
    }

    .content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    img {
        margin-top: 20px;
        width: 400px;
        max-width: 90%;
        height: auto;
        border-radius: 10px;
    }

    button {
        margin-top: 15px;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
    }

    a {
        display: block;
        margin-top: 20px;
        font-size: 18px;
        text-decoration: none;
        color: blue;
    }
</style>
</head>

<body>

<h1>Hugh of the Day</h1>

<div class="content">
    <img id="hughImage" src="" alt="Loading Hugh...">
    <button onclick="loadRandomHugh()">🎲 Random Hugh</button>
</div>

<p id="progress"></p>
<p id="message" style="font-weight: bold;"></p>

<a href="archive.html">View Archive</a>

<script>

// -------- STEP 1 --------
function formatDate(date) {
    return `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
}

// -------- STEP 2 --------
function checkImage(src) {
    return new Promise(resolve => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
    });
}

async function findAllImages() {
    const images = [];
    const start = new Date(2026, 4, 1); // 🔁 change to your first date
    const today = new Date();

    const formats = [".jpg", ".png", ".jpeg"];

    for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const base = formatDate(d);

        for (let ext of formats) {
            const file = base + ext;

            if (await checkImage(file)) {
                images.push(file);
                break;
            }
        }
    }

    return images;
}

// -------- RANDOM SYSTEM --------
let hughFiles = [];
let shuffled = [];
let currentIndex = 0;

function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function resetShuffle() {
    shuffled = shuffle(hughFiles);
    currentIndex = 0;
    updateProgress();
}

function updateProgress() {
    document.getElementById("progress").innerText =
        `Seen ${currentIndex} / ${shuffled.length} Hughs`;
}

function loadRandomHugh() {
    if (currentIndex >= shuffled.length) {
        document.getElementById("message").innerText =
            "✅ You've seen all Hughs! Reshuffling...";
        resetShuffle();
    } else {
        document.getElementById("message").innerText = "";
    }

    document.getElementById("hughImage").src = shuffled[currentIndex];
    currentIndex++;
    updateProgress();
}

// -------- TODAY IMAGE --------
function loadTodayImage() {
    const base = formatDate(new Date());
    const formats = [".jpg", ".png", ".jpeg"];

    formats.forEach(ext => {
        const img = new Image();
        img.src = base + ext;
        img.onload = () => {
            document.getElementById("hughImage").src = img.src;
        };
    });
}

// -------- INIT --------
async function init() {
    hughFiles = await findAllImages();
    resetShuffle();
    loadTodayImage();
}

init();

</script>

</body>
</html>
