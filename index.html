<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugh of the Day</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 0;
    }

    h1 {
        margin-top: 40px;
        font-size: 2.5em;
    }

    .content {
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    img {
        margin-top: 20px;
        width: 400px;
        max-width: 90%;
        height: auto;
        border-radius: 10px;
    }

    button {
        margin-top: 15px;
        padding: 10px 15px;
        font-size: 16px;
        cursor: pointer;
    }

    a {
        display: block;
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>

<body>

<h1>Hugh of the Day</h1>

<div class="content">
    <!-- ✅ FIX: IMAGE ADDED -->
    <img id="hughImage" src="" alt="Hugh">
    
    <button onclick="loadRandomHugh()">🎲 Random Hugh</button>
</div>

<p id="progress"></p>
<p id="message"></p>

<!-- ✅ FIX: LINK -->
<a href="archive.html">View Archive</a>

<script>
function formatDate(date) {
    return `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}`;
}

function checkImage(src) {
    return new Promise(resolve => {
        const img = new Image();
        img.src = src;
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
    });
}

async function findAllImages() {
    const images = [];
    const start = new Date(2026, 4, 24); // ✅ set to your FIRST image
    const today = new Date();

    const formats = [".jpg", ".png"];

    for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
        const base = formatDate(d);

        for (let ext of formats) {
            const file = base + ext;
            if (await checkImage(file)) {
                images.push(file);
                break;
            }
        }
    }

    return images;
}

let hughFiles = [];
let shuffled = [];
let currentIndex = 0;

function shuffle(arr) {
    return arr.sort(() => Math.random() - 0.5);
}

function resetShuffle() {
    shuffled = shuffle([...hughFiles]);
    currentIndex = 0;
    updateProgress();
}

function updateProgress() {
    document.getElementById("progress").innerText =
        `Seen ${currentIndex} / ${shuffled.length}`;
}

function loadRandomHugh() {
    if (currentIndex >= shuffled.length) {
        document.getElementById("message").innerText = "✅ Seen all! Resetting...";
        resetShuffle();
    } else {
        document.getElementById("message").innerText = "";
    }

    document.getElementById("hughImage").src = shuffled[currentIndex];
    currentIndex++;
    updateProgress();
}


async function init() {
    hughFiles = await findAllImages();

    // ✅ Sort newest → oldest
    hughFiles.sort().reverse();

    // ✅ Show latest image
    if (hughFiles.length > 0) {
        document.getElementById("hughImage").src = hughFiles[0];
    }

    resetShuffle();
}


init();
</script>

</body>
</html>
