<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hugh of the Day</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: linear-gradient(135deg, #dbeafe, #f0fdf4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .app {
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        text-align: center;
        width: 320px;
    }

    h1 {
        margin: 0;
        font-size: 24px;
    }

    img {
        width: 100%;
        border-radius: 15px;
        margin-top: 15px;
    }

    button {
        margin-top: 15px;
        padding: 10px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background: #3b82f6;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #2563eb;
    }

    .secondary {
        background: #e5e7eb;
        color: black;
    }

    .secondary:hover {
        background: #d1d5db;
    }

    .info {
        margin-top: 10px;
        font-size: 14px;
        color: #555;
    }

    .message {
        font-weight: bold;
        margin-top: 5px;
    }
</style>
</head>

<body>

<div class="app">
    <h1>Hugh of the Day</h1>

    

    <button onclick="loadRandomHugh()">🎲 Random Hugh</button>
    <button class="secondary" onclick="goArchive()">📅 Archive</button>

    <div class="info" id="progress"></div>
    <div class="message" id="message"></div>
</div>

<script>
    const hughFiles = [
        "20260524.png",
        "20260525.png",
        "20260526.jpg"
    ];

    let shuffled = [];
    let currentIndex = 0;

    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function resetShuffle() {
        shuffled = shuffle(hughFiles);
        currentIndex = 0;
        updateProgress();
    }

    function updateProgress() {
        document.getElementById("progress").innerText =
            `Seen ${currentIndex} / ${shuffled.length}`;
    }

    function loadRandomHugh() {
        if (currentIndex >= shuffled.length) {
            document.getElementById("message").innerText =
                "✅ Seen all Hughs! Reshuffling...";
            resetShuffle();
        } else {
            document.getElementById("message").innerText = "";
        }

        document.getElementById("hughImage").src = shuffled[currentIndex];
        currentIndex++;
        updateProgress();
    }

    function getTodayFilename() {
        const d = new Date();
        return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    }

    function loadToday() {
        const base = getTodayFilename();
        const formats = [".jpg", ".png", ".jpeg"];

        formats.forEach(ext => {
            const img = new Image();
            img.src = base + ext;
            img.onload = () => {
                document.getElementById("hughImage").src = img.src;
            };
        });
    }

    function goArchive() {
        window.location.href = "archive.html";
    }

    resetShuffle();
    loadToday();
</script>

</body>
</html>
